spring:
  application:
    name: bloghub

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${CLERK_JWKS_URI:https://elegant-dog-65.clerk.accounts.dev/.well-known/jwks.json}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bloghub_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1200000
      pool-name: HikariPool-Local

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  flyway:
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    out-of-order: false

  servlet:
    multipart:
      max-file-size: 6MB
      max-request-size: 6MB

app:
  aws:
    region: ${AWS_REGION:ap-south-1}
    s3:
      bucket-name: ${AWS_S3_BUCKET:amzn-s3-spark-buket}
      endpoint: ${AWS_S3_ENDPOINT:}
      path-style-access-enabled: ${AWS_S3_PATH_STYLE:false}
      presigned-url-ttl-minutes: 15
      max-file-size-bytes: 5242880
      allowed-content-types: image/jpeg,image/png,image/webp,image/gif
      trusted-image-hosts:
        - amzn-s3-spark-buket.s3.ap-south-1.amazonaws.com
        - images.unsplash.com

  pagination:
    default-page-size: 10
    max-page-size: 50

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

  rate-limit:
    asset-upload-per-user-per-hour: 100
    write-per-user-per-minute: 60

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include:
          - health
          - info
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
      probes:
        enabled: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

logging:
  level:
    root: INFO
    com.subho.bloghub: DEBUG
    org.springframework.web: DEBUG
    com.zaxxer.hikari: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

server:
  port: 8070
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false